spring.application.name=gymcore
spring.profiles.active=local
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.activemq.broker-url=${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
spring.activemq.user=${ACTIVEMQ_USER:admin}
spring.activemq.password=${ACTIVEMQ_PASSWORD:admin}

workload.queue.trainer-workload=${TRAINER_WORKLOAD_QUEUE:trainer.workload.queue}

spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

logging.pattern.level=%5p [%X{transactionId:-}]
