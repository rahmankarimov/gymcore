spring.application.name=trainer-workload-service
server.port=8081

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.activemq.broker-url=${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
spring.activemq.user=${ACTIVEMQ_USER:admin}
spring.activemq.password=${ACTIVEMQ_PASSWORD:admin}

workload.queue.trainer-workload=${TRAINER_WORKLOAD_QUEUE:trainer.workload.queue}

security.jwt.secret=gymcore-development-secret-key-change-me

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.pattern.level=%5p [%X{transactionId:-}]
